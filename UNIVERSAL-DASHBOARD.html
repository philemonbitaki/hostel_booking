<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIVERSAL DASHBOARD - Fonctionne partout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 15px;
            color: white;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .control-panel {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .btn-delete {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
        }
        .btn-reload {
            background: linear-gradient(135deg, #4834d4, #686de0);
            color: white;
        }
        .btn-count {
            background: linear-gradient(135deg, #6ab04c, #badc58);
            color: white;
        }
        .status-bar {
            background: linear-gradient(135deg, #f9ca24, #f0932b);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            color: white;
            font-weight: bold;
            text-align: center;
        }
        .bookings-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .booking-item {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            border-left: 5px solid #4facfe;
            transition: all 0.3s ease;
        }
        .booking-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .booking-name {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .booking-email {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .booking-details {
            color: #34495e;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-confirmed {
            background: linear-gradient(135deg, #00d2d3, #01a3a4);
            color: white;
        }
        .status-cancelled {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .stat-label {
            color: #7f8c8d;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
            font-size: 18px;
        }
        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header fade-in">
            <h1>🚀 UNIVERSAL DASHBOARD</h1>
            <p>Système de gestion des réservations - Fonctionne partout</p>
        </div>

        <div class="control-panel fade-in">
            <h2 style="text-align: center; margin-bottom: 20px; color: #2c3e50;">🎛️ Panneau de Contrôle</h2>
            <p style="text-align: center; color: #7f8c8d; margin-bottom: 20px;">Gérez toutes vos réservations</p>
            
            <div class="button-group">
                <button class="btn btn-delete" onclick="deleteAll()">
                    🗑️ Supprimer Tout
                </button>
                <button class="btn btn-reload" onclick="reloadAll()">
                    🔄 Recharger
                </button>
                <button class="btn btn-count" onclick="showCount()">
                    📊 Compter
                </button>
            </div>
            
            <div class="status-bar">
                <strong>STATUT:</strong> <span id="statusMessage">Système prêt - Cliquez sur un bouton</span>
            </div>
        </div>

        <div class="bookings-section fade-in">
            <h2 style="margin-bottom: 20px; color: #2c3e50;">📋 Réservations des Clients</h2>
            <div id="bookingsList"></div>
        </div>

        <div class="stats-grid fade-in">
            <div class="stat-card">
                <div class="stat-number" id="totalCount" style="color: #3498db;">0</div>
                <div class="stat-label">Total Réservations</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="confirmedCount" style="color: #27ae60;">0</div>
                <div class="stat-label">Confirmées</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="cancelledCount" style="color: #e74c3c;">0</div>
                <div class="stat-label">Annulées</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="revenueCount" style="color: #f39c12;">$0</div>
                <div class="stat-label">Revenu Total</div>
            </div>
        </div>
    </div>

    <script>
        // DONNÉES INITIALES
        const INITIAL_DATA = [
            { id: 1, name: 'Marie Dubois', email: 'marie@email.com', hostel: 'New Generation', price: 360, status: 'confirmed' },
            { id: 2, name: 'Jean Martin', email: 'jean@email.com', hostel: 'Annex', price: 405, status: 'cancelled' },
            { id: 3, name: 'Sophie Bernard', email: 'sophie@email.com', hostel: 'Hudreb', price: 495, status: 'confirmed' },
            { id: 4, name: 'Pierre Leroy', email: 'pierre@email.com', hostel: 'Campus View Residence', price: 2250, status: 'confirmed' },
            { id: 5, name: 'Claire Petit', email: 'claire@email.com', hostel: "Scholar's Hub", price: 270, status: 'confirmed' },
            { id: 6, name: 'Lucas Robert', email: 'lucas@email.com', hostel: 'Green Campus Dorm', price: 315, status: 'cancelled' },
            { id: 7, name: 'Emma Moreau', email: 'emma@email.com', hostel: 'New Generation', price: 405, status: 'cancelled' }
        ];

        // ÉTAT GLOBAL
        let bookings = [...INITIAL_DATA];

        // FONCTIONS UTILITAIRES
        function updateStatus(message) {
            const statusElement = document.getElementById('statusMessage');
            statusElement.textContent = message;
            statusElement.parentElement.style.animation = 'none';
            setTimeout(() => {
                statusElement.parentElement.style.animation = 'fadeIn 0.5s ease';
            }, 10);
        }

        function updateStats() {
            const total = bookings.length;
            const confirmed = bookings.filter(b => b.status === 'confirmed').length;
            const cancelled = bookings.filter(b => b.status === 'cancelled').length;
            const revenue = bookings.filter(b => b.status === 'confirmed').reduce((sum, b) => sum + b.price, 0);

            document.getElementById('totalCount').textContent = total;
            document.getElementById('confirmedCount').textContent = confirmed;
            document.getElementById('cancelledCount').textContent = cancelled;
            document.getElementById('revenueCount').textContent = `$${revenue}`;
        }

        function renderBookings() {
            const container = document.getElementById('bookingsList');
            
            if (bookings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>Aucune réservation trouvée</h3>
                        <p>Cliquez sur "Recharger" pour restaurer les données</p>
                    </div>
                `;
            } else {
                container.innerHTML = bookings.map(booking => `
                    <div class="booking-item fade-in">
                        <div class="booking-name">${booking.name}</div>
                        <div class="booking-email">${booking.email}</div>
                        <div class="booking-details">${booking.hostel} - $${booking.price}</div>
                        <span class="status-badge status-${booking.status}">${booking.status}</span>
                    </div>
                `).join('');
            }
            
            updateStats();
        }

        // FONCTIONS PRINCIPALES
        function deleteAll() {
            updateStatus('Suppression en cours...');
            
            if (confirm('⚠️ Êtes-vous sûr de vouloir supprimer TOUTES les réservations?\n\nCette action est irréversible!')) {
                bookings = [];
                renderBookings();
                updateStatus('✅ Toutes les réservations ont été supprimées!');
                setTimeout(() => {
                    alert('🎉 Succès! Toutes les réservations ont été supprimées.');
                }, 500);
            } else {
                updateStatus('❌ Suppression annulée');
            }
        }

        function reloadAll() {
            updateStatus('Rechargement en cours...');
            
            if (confirm('🔄 Voulez-vous recharger toutes les réservations initiales?')) {
                bookings = [...INITIAL_DATA];
                renderBookings();
                updateStatus('✅ Réservations rechargées avec succès!');
                setTimeout(() => {
                    alert('🎉 Succès! Les réservations ont été rechargées.');
                }, 500);
            } else {
                updateStatus('❌ Rechargement annulé');
            }
        }

        function showCount() {
            const count = bookings.length;
            updateStatus(`Comptage effectué: ${count} réservation(s)`);
            alert(`📊 NOMBRE DE RÉSERVATIONS: ${count}\n\n- Confirmées: ${bookings.filter(b => b.status === 'confirmed').length}\n- Annulées: ${bookings.filter(b => b.status === 'cancelled').length}`);
        }

        // INITIALISATION
        document.addEventListener('DOMContentLoaded', function() {
            updateStatus('Dashboard chargé avec succès!');
            renderBookings();
            
            // Animation de bienvenue
            setTimeout(() => {
                updateStatus('Système prêt - Utilisez les boutons ci-dessus');
            }, 2000);
        });

        // GESTION DES ERREURS
        window.onerror = function(message, source, lineno, colno, error) {
            console.error('ERREUR:', message);
            updateStatus('❌ Erreur détectée - Actualisez la page');
            return false;
        };

        // DEBUG: Afficher les données dans la console
        console.log('🚀 UNIVERSAL DASHBOARD CHARGÉ');
        console.log('Données initiales:', INITIAL_DATA);
        console.log('Fonctions disponibles:', { deleteAll, reloadAll, showCount });
    </script>
</body>
</html>
